global
	log 127.0.0.1	daemon info
	#log loghost	local0 info
	maxconn 4096
	#chroot /usr/share/haproxy
	user haproxy
	group haproxy
	daemon
    #nbproc 6
	#debug
	#quiet

defaults
	log	global
	mode	http
	option	httplog
	option	dontlognull
	retries	3
	option redispatch
	maxconn	2000
	timeout connect	9000ms
	timeout client	7200000ms
	timeout server	7200000ms
    stats uri     /admin?stats
    stats refresh 5s
    # these are added so the client ip comes through
    option http-server-close
    option forwardfor


listen solr
	bind	*:8984
	mode	http
	balance	leastconn
	http-request use-service prometheus-exporter if { path /metrics }
    option httpchk GET /solr/openlibrary/admin/ping
    server  ol-solr0 ol-solr0.us.archive.org:8983 weight 60 maxconn 100 check inter 4000 rise 2 fall 2
    server  ol-solr1 ol-solr1.us.archive.org:8983 weight 45 maxconn 75 check inter 4000 rise 2 fall 2
