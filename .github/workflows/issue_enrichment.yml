name: Issue Enrichment

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Debug: manually enrich a specific existing issue"
        required: true
        type: string

permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: issue-enrichment-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.user.type != 'Bot' &&
       !contains(github.event.issue.labels.*.name, 'agentic-workflows'))
    steps:
      - uses: actions/checkout@v4

      - name: Enrich issue
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            @.github/workflows/issue_enrichment.md

            ${{ github.event_name == 'workflow_dispatch' && format('Manual test dispatch: enrich issue #{0}. Fetch its data yourself in Step 1 -- do not assume anything about it from this line.', inputs.issue_number) || format('Issue #{0} was just opened by @{1}.\nTitle: {2}', github.event.issue.number, github.event.issue.user.login, github.event.issue.title) }}
          claude_args: >-
            --max-turns 30
            --allowedTools "Bash(git *) Bash(grep:*) Bash(cat:*) Bash(gh issue view:*)
            Bash(gh issue comment:*) Bash(gh issue edit:*) Bash(gh issue close:*)
            Bash(gh issue list:*) Bash(gh pr list:*) Bash(gh api:*) Bash(gh label list:*)"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.OL_BOT_PAT }}
          # Issues are opened by any public contributor, most of whom have only
          # read access. claude-code-action's default actor-permission check
          # requires write access, so it rejects every issue except ones filed
          # by maintainers -- defeating the workflow's purpose. Bypass is safe
          # here since --allowedTools is already scoped to issue-only operations.
          allowed_non_write_users: "*"
