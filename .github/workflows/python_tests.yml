name: python_tests
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    paths-ignore:
      - '.github/workflows/javascript_tests.yml'
      - 'vendor/js/**'
      - 'package*.json'
      - '**.js'
      - '**.vue'
      - '**.css'
      - '**.md'
permissions:
  contents: read

jobs:
  python_tests:
    runs-on: ubuntu-latest
    env:
      TZ: UTC
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: |
          # Install libxml2 for lxml (required for building)
          sudo apt-get update
          sudo apt-get install -y libxml2 libxslt-dev
          # Install dependencies with uv
          uv sync --group dev
      - run: make git
      - name: Run make i18n
        run: |
          uv run make i18n
          uv run make test-i18n
      - name: Run tests
        run: |
          git fetch --no-tags --prune --depth=1 origin master
          uv run pytest . --ignore=infogami --ignore=vendor --ignore=node_modules
          uv run python scripts/run_doctests.sh
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
