name: olbase

on:
  schedule:
    - cron: '00 16 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # If on master, use the latest tag, otherwise use the branch name
      - name: Master Build and push amd64
        uses: docker/build-push-action@v6
        if: github.ref == 'refs/heads/master'
        with:
          context: "."
          file: "./docker/Dockerfile.olbase"
          platforms: linux/amd64
          tags: openlibrary/olbase:latest
          push: true

      - name: Master Build and push arm64
        uses: docker/build-push-action@v6
        if: github.ref == 'refs/heads/master'
        with:
          context: "."
          file: "./docker/Dockerfile.olbase"
          platforms: linux/arm64
          tags: openlibrary/olbase:latest-arm64
          push: true

      - name: Combine the manifests of the amd and arm images in a manifest
        if: github.ref == 'refs/heads/master'
        run: |
          docker tag openlibrary/olbase:latest openlibrary/olbase:latest-amd64
          docker push openlibrary/olbase:latest-amd64

          docker manifest create openlibrary/olbase:latest \
            openlibrary/olbase:latest-amd64 \
            openlibrary/olbase:latest-arm64
          docker manifest annotate openlibrary/olbase:latest openlibrary/olbase:latest-amd64 --os linux --arch amd64
          docker manifest annotate openlibrary/olbase:latest openlibrary/olbase:latest-arm64 --os linux --arch arm64
          docker manifest push openlibrary/olbase:latest

      # If on another branch, use the branch name -- just the branch name, not the full ref
      - name: Test Branch Build and push amd64
        uses: docker/build-push-action@v6
        if: github.ref != 'refs/heads/master'
        with:
          context: "."
          file: "./docker/Dockerfile.olbase"
          platforms: linux/amd64
          tags: openlibrary/olbase:${{ github.ref_name }}
          push: true

      - name: Test Branch Build and push arm64
        uses: docker/build-push-action@v6
        if: github.ref != 'refs/heads/master'
        with:
          context: "."
          file: "./docker/Dockerfile.olbase"
          platforms: linux/arm64
          tags: openlibrary/olbase:${{ github.ref_name }}-arm64
          push: true

      - name: Test Branch Combine the manifests of the amd and arm images in a manifest
        if: github.ref != 'refs/heads/master'
        run: |
          docker tag openlibrary/olbase:${{ github.ref_name }} openlibrary/olbase:${{ github.ref_name }}-amd64
          docker push openlibrary/olbase:${{ github.ref_name }}-amd64

          docker manifest create openlibrary/olbase:${{ github.ref_name }} \
            openlibrary/olbase:${{ github.ref_name }}-amd64 \
            openlibrary/olbase:${{ github.ref_name }}-arm64
          docker manifest annotate openlibrary/olbase:${{ github.ref_name }} openlibrary/olbase:${{ github.ref_name }}-amd64 --os linux --arch amd64
          docker manifest annotate openlibrary/olbase:${{ github.ref_name }} openlibrary/olbase:${{ github.ref_name }}-arm64 --os linux --arch arm64
          docker manifest push openlibrary/olbase:${{ github.ref_name }}
