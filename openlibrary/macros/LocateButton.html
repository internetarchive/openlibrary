$def with(worldcat_url=None)

<div class="cta-button-group">
  $if worldcat_url:
    <a class="cta-btn cta-btn--w-icon"
       href="$worldcat_url"
       target="_blank" rel="noopener noreferrer"
       data-ol-link-track="CTAClick|CheckWorldcat">
      <span class="btn-icon map"></span>
      <span class="btn-label">$_("Check Worldcat")</span>
    </a>
  $else:
    <span class="cta-btn cta-btn--no-pointer" aria-disabled="true">$_("Not Available")</span>
</div>
